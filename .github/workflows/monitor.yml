name: Bot Vuelos Diario

on:
  schedule:
    - cron: '0 12 * * *'  # 9am hora Chile (UTC-3)
  workflow_dispatch:       # permite dispararlo a mano desde GitHub

jobs:
  enviar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests fast-flights

      - name: Enviar links a Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_vuelos.py

      - name: Guardar precio histórico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ultimo_precio.txt || true
          git diff --staged --quiet || git commit -m "precio actualizado"
          git push || true
